cache_dir: "c:/Users/Jacob Poschl/le-jepa-snn/snn-jepa/visual_behavior_neuropixels_data"
results_dir: "c:/Users/Jacob Poschl/Desktop/visb_ecephys_analysis/results"

sessions:
  # "wt/wt" matches homozygous wildtype mice only — verify against your session table
  # before running: check unique genotype values with session_handler.session_table["genotype"].unique()
  genotype: "wt/wt"

unit_filters:
  snr_min : 1.0
  isi_violations_max : 1.0
  firing_rate_min : 0.1
  quality: "good"

optotagging:
  baseline_window : [-0.010, -0.002]
  evoked_window : [0.001, 0.009]
  min_fold_increase : 2
  min_evoked_rate : 50
  max_pulse_duration : 0.1

psth:
  time_before : 0.05  # 50 ms before pulse
  duration : 0.15     # 100 ms after pulse onset
  bin_size : 0.001

psth_visual:
  time_before : 0.5
  duration : 1.5
  bin_size : 0.001
